<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ContestCal – Coding Contest Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a;
    --surface: #141624;
    --surface2: #1c1f35;
    --border: #252840;
    --text: #e8eaf6;
    --muted: #6b7199;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43d9ad;
    --yellow: #f5c518;
    --orange: #ff8c42;
    --red: #ff4d6d;

    --he: #00b386;   /* HackerEarth */
    --lc: #ffa116;   /* LeetCode */
    --cf: #1890ff;   /* Codeforces */
    --hr: #2ec866;   /* HackerRank */
    --cc: #c0392b;   /* CodeChef */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
  }

  /* ── BACKGROUND GRID ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { font-size: 0.75rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .header-right { display: flex; gap: 10px; align-items: center; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 1.8rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-value.green { color: var(--green); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.red { color: var(--red); }

  /* ── FILTER TABS ── */
  .filter-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 16px; border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted); cursor: pointer;
    font-size: 0.8rem; font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .filter-btn.platform-btn { display: flex; align-items: center; gap: 6px; }
  .platform-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── MAIN GRID ── */
  .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
  @media (max-width: 800px) { .main-grid { grid-template-columns: 1fr; } }

  /* ── CONTEST CARDS ── */
  .contest-list { display: flex; flex-direction: column; gap: 12px; }
  .contest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative; overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  .contest-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 8px 32px rgba(108,99,255,0.15); }
  .contest-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 4px 0 0 4px;
  }
  .contest-card[data-platform="HackerEarth"]::before { background: var(--he); }
  .contest-card[data-platform="LeetCode"]::before { background: var(--lc); }
  .contest-card[data-platform="Codeforces"]::before { background: var(--cf); }
  .contest-card[data-platform="HackerRank"]::before { background: var(--hr); }
  .contest-card[data-platform="CodeChef"]::before { background: var(--cc); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .card-title { font-size: 1rem; font-weight: 600; flex: 1; }
  .platform-badge {
    padding: 3px 10px; border-radius: 100px; font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    white-space: nowrap;
  }
  .badge-HackerEarth { background: rgba(0,179,134,0.15); color: var(--he); }
  .badge-LeetCode { background: rgba(255,161,22,0.15); color: var(--lc); }
  .badge-Codeforces { background: rgba(24,144,255,0.15); color: var(--cf); }
  .badge-HackerRank { background: rgba(46,200,102,0.15); color: var(--hr); }
  .badge-CodeChef { background: rgba(192,57,43,0.15); color: var(--cc); }

  .card-meta { display: flex; gap: 16px; font-size: 0.78rem; color: var(--muted); margin-bottom: 14px; flex-wrap: wrap; }
  .card-meta span { display: flex; align-items: center; gap: 5px; }

  .countdown {
    background: var(--surface2); border-radius: 10px; padding: 12px 16px;
    display: flex; gap: 16px; align-items: center; margin-bottom: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .time-unit { text-align: center; }
  .time-val { font-size: 1.4rem; font-weight: 700; color: var(--green); line-height: 1; }
  .time-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .time-sep { font-size: 1.2rem; color: var(--muted); margin-top: -4px; }
  .countdown.urgent .time-val { color: var(--red); animation: pulse 1s ease infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .card-actions { display: flex; gap: 8px; justify-content: space-between; align-items: center; }
  .difficulty { font-size: 0.75rem; padding: 3px 10px; border-radius: 100px; }
  .diff-Easy { background: rgba(67,217,173,0.15); color: var(--green); }
  .diff-Medium { background: rgba(245,197,24,0.15); color: var(--yellow); }
  .diff-Hard { background: rgba(255,77,109,0.15); color: var(--red); }

  .btn-group { display: flex; gap: 8px; }
  .btn-sm {
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-size: 0.75rem; cursor: pointer; transition: all 0.15s;
    font-family: 'Sora', sans-serif;
  }
  .btn-sm:hover { background: var(--surface2); color: var(--text); }
  .btn-sm.participated { background: rgba(67,217,173,0.15); color: var(--green); border-color: var(--green); }
  .btn-sm.remind-active { background: rgba(108,99,255,0.2); color: var(--accent); border-color: var(--accent); }
  .btn-sm.danger:hover { background: rgba(255,77,109,0.15); color: var(--red); border-color: var(--red); }

  /* ── PAST BADGE ── */
  .contest-card.past { opacity: 0.6; }
  .contest-card.past .card-title { text-decoration: line-through; }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 18px; }

  .panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px;
  }
  .panel-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 16px; }

  /* ── ADD FORM ── */
  .form-group { margin-bottom: 12px; }
  label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 5px; }
  input, select {
    width: 100%; padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2); color: var(--text);
    font-family: 'Sora', sans-serif; font-size: 0.85rem;
    outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .btn-primary {
    width: 100%; padding: 10px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: white; font-weight: 600; border: none; cursor: pointer;
    font-size: 0.85rem; font-family: 'Sora', sans-serif;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }

  /* ── STREAK ── */
  .streak-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .streak-cell {
    aspect-ratio: 1; border-radius: 3px; background: var(--surface2);
    transition: background 0.2s;
    title: "";
  }
  .streak-cell.participated { background: var(--green); }
  .streak-cell.missed { background: var(--surface2); }

  /* ── PLATFORM STATS ── */
  .platform-stat { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .pstat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pstat-name { font-size: 0.85rem; flex: 1; }
  .pstat-bar-wrap { flex: 2; height: 6px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
  .pstat-bar { height: 100%; border-radius: 100px; transition: width 0.5s ease; }
  .pstat-count { font-size: 0.78rem; font-family: 'JetBrains Mono', monospace; color: var(--muted); min-width: 20px; text-align: right; }

  /* ── EXPORT ── */
  .btn-export {
    width: 100%; padding: 9px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    font-family: 'Sora', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-export:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state p { font-size: 0.9rem; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--surface); border: 1px solid var(--accent);
    padding: 12px 20px; border-radius: 12px;
    font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;
    opacity: 0; transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  .header-btn {
    padding: 8px 16px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; font-size: 0.8rem;
    font-family: 'Sora', sans-serif; transition: all 0.2s;
  }
  .header-btn:hover { border-color: var(--accent); color: var(--text); }

  .streak-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; color: var(--muted); }
  .streak-fire { color: var(--orange); font-weight: 700; }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <h1>ContestCal</h1>
        <span>// coding contest tracker</span>
      </div>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="requestNotifPermission()">🔔 Enable Alerts</button>
      <button class="header-btn" onclick="exportICS()">📅 Export .ics</button>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Upcoming</div>
      <div class="stat-value accent" id="stat-upcoming">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Tracked</div>
      <div class="stat-value yellow" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Participated</div>
      <div class="stat-value green" id="stat-participated">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Current Streak 🔥</div>
      <div class="stat-value red" id="stat-streak">0</div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
    <button class="filter-btn platform-btn" onclick="setFilter('HackerEarth', this)">
      <span class="platform-dot" style="background:var(--he)"></span>HackerEarth
    </button>
    <button class="filter-btn platform-btn" onclick="setFilter('LeetCode', this)">
      <span class="platform-dot" style="background:var(--lc)"></span>LeetCode
    </button>
    <button class="filter-btn platform-btn" onclick="setFilter('Codeforces', this)">
      <span class="platform-dot" style="background:var(--cf)"></span>Codeforces
    </button>
    <button class="filter-btn platform-btn" onclick="setFilter('HackerRank', this)">
      <span class="platform-dot" style="background:var(--hr)"></span>HackerRank
    </button>
    <button class="filter-btn platform-btn" onclick="setFilter('CodeChef', this)">
      <span class="platform-dot" style="background:var(--cc)"></span>CodeChef
    </button>
    <button class="filter-btn" onclick="setFilter('past', this)">📋 History</button>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- CONTEST LIST -->
    <div>
      <div class="contest-list" id="contest-list"></div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- ADD CONTEST -->
      <div class="panel">
        <div class="panel-title">+ Add Contest</div>
        <div class="form-group">
          <label>Contest Name</label>
          <input type="text" id="in-name" placeholder="Weekly Contest #450" />
        </div>
        <div class="form-group">
          <label>Platform</label>
          <select id="in-platform">
            <option>HackerEarth</option>
            <option>LeetCode</option>
            <option>Codeforces</option>
            <option>HackerRank</option>
            <option>CodeChef</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date & Time</label>
          <input type="datetime-local" id="in-date" />
        </div>
        <div class="form-group">
          <label>Duration (minutes)</label>
          <input type="number" id="in-duration" placeholder="90" min="1" />
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <select id="in-difficulty">
            <option>Easy</option>
            <option selected>Medium</option>
            <option>Hard</option>
          </select>
        </div>
        <button class="btn-primary" onclick="addContest()">Track Contest</button>
      </div>

      <!-- STREAK -->
      <div class="panel">
        <div class="panel-title">Participation Streak (Last 4 Weeks)</div>
        <div class="streak-info">
          <span>Mon → Sun</span>
          <span class="streak-fire" id="streak-display">0 week streak 🔥</span>
        </div>
        <div class="streak-grid" id="streak-grid"></div>
      </div>

      <!-- PLATFORM STATS -->
      <div class="panel">
        <div class="panel-title">Platform Breakdown</div>
        <div id="platform-stats"></div>
      </div>

      <!-- EXPORT ACTIONS -->
      <div class="panel">
        <div class="panel-title">Actions</div>
        <button class="btn-export" onclick="exportICS()">📅 Export to Google/Apple Calendar (.ics)</button>
        <br/>
        <button class="btn-export" onclick="clearAll()" style="margin-top:8px; color: var(--red);">🗑️ Clear All Data</button>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ──
let contests = JSON.parse(localStorage.getItem('contestcal_v1') || '[]');
let filter = 'All';
let countdownIntervals = {};

const PLATFORM_COLORS = {
  HackerEarth: 'var(--he)',
  LeetCode: 'var(--lc)',
  Codeforces: 'var(--cf)',
  HackerRank: 'var(--hr)',
  CodeChef: 'var(--cc)',
};

// ── SEED DATA ──
function seedData() {
  if (contests.length > 0) return;
  const now = Date.now();
  const H = 3600000;
  contests = [
    { id: uid(), name: 'HackerEarth April Sprint', platform: 'HackerEarth', date: now + 2 * H, duration: 120, difficulty: 'Medium', participated: false, reminded: false },
    { id: uid(), name: 'LeetCode Weekly Contest #450', platform: 'LeetCode', date: now + 6 * H, duration: 90, difficulty: 'Hard', participated: false, reminded: false },
    { id: uid(), name: 'Codeforces Round #950 (Div 2)', platform: 'Codeforces', date: now + 25 * H, duration: 135, difficulty: 'Hard', participated: false, reminded: false },
    { id: uid(), name: 'HackerRank Week of Code', platform: 'HackerRank', date: now - 5 * H, duration: 60, difficulty: 'Easy', participated: true, reminded: false },
    { id: uid(), name: 'CodeChef Starters 132', platform: 'CodeChef', date: now - 48 * H, duration: 180, difficulty: 'Medium', participated: false, reminded: false },
  ];
  save();
}

// ── UTILS ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function save() { localStorage.setItem('contestcal_v1', JSON.stringify(contests)); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
function formatDate(ts) {
  return new Date(ts).toLocaleString('en-IN', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ── COUNTDOWN ──
function countdown(ts) {
  const diff = ts - Date.now();
  if (diff <= 0) return null;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return { d, h, m, s, diff };
}

function countdownHTML(ts) {
  const c = countdown(ts);
  if (!c) return `<div class="countdown urgent"><span style="color:var(--red);font-family:'JetBrains Mono'">Contest has ended</span></div>`;
  const urgent = c.diff < 3600000;
  return `<div class="countdown ${urgent ? 'urgent' : ''}">
    ${c.d > 0 ? `<div class="time-unit"><div class="time-val" id="d-${ts}">${String(c.d).padStart(2,'0')}</div><div class="time-label">days</div></div><span class="time-sep">:</span>` : ''}
    <div class="time-unit"><div class="time-val">${String(c.h).padStart(2,'0')}</div><div class="time-label">hrs</div></div>
    <span class="time-sep">:</span>
    <div class="time-unit"><div class="time-val">${String(c.m).padStart(2,'0')}</div><div class="time-label">min</div></div>
    <span class="time-sep">:</span>
    <div class="time-unit"><div class="time-val" id="s-${ts}">${String(c.s).padStart(2,'0')}</div><div class="time-label">sec</div></div>
    ${urgent ? '<span style="margin-left:8px;font-size:1.2rem">⚠️</span>' : ''}
  </div>`;
}

// ── RENDER ──
function render() {
  clearAllIntervals();
  const list = document.getElementById('contest-list');
  const now = Date.now();

  let filtered = contests.slice();
  if (filter === 'past') {
    filtered = filtered.filter(c => c.date < now);
  } else if (filter !== 'All') {
    filtered = filtered.filter(c => c.platform === filter && c.date >= now);
  } else {
    filtered = filtered.filter(c => c.date >= now);
  }

  filtered.sort((a, b) => a.date - b.date);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="icon">${filter === 'past' ? '📋' : '🏆'}</div>
      <p>${filter === 'past' ? 'No past contests yet.' : 'No upcoming contests. Add one →'}</p>
    </div>`;
    updateStats(); updateStreak(); updatePlatformStats();
    return;
  }

  list.innerHTML = filtered.map(c => {
    const isPast = c.date < now;
    return `<div class="contest-card ${isPast ? 'past' : ''}" data-platform="${c.platform}" id="card-${c.id}">
      <div class="card-top">
        <div class="card-title">${c.name}</div>
        <span class="platform-badge badge-${c.platform}">${c.platform}</span>
      </div>
      <div class="card-meta">
        <span>📅 ${formatDate(c.date)}</span>
        <span>⏱ ${c.duration} min</span>
      </div>
      ${isPast ? '' : `<div id="cd-${c.id}">${countdownHTML(c.date)}</div>`}
      <div class="card-actions">
        <span class="difficulty diff-${c.difficulty}">${c.difficulty}</span>
        <div class="btn-group">
          ${!isPast ? `<button class="btn-sm ${c.reminded ? 'remind-active' : ''}" onclick="toggleRemind('${c.id}')">${c.reminded ? '🔔 Reminded' : '🔕 Remind'}</button>` : ''}
          <button class="btn-sm ${c.participated ? 'participated' : ''}" onclick="toggleParticipated('${c.id}')">${c.participated ? '✅ Done' : '◻ Mark Done'}</button>
          <button class="btn-sm danger" onclick="deleteContest('${c.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Live countdowns
  filtered.filter(c => c.date > now).forEach(c => {
    const interval = setInterval(() => {
      const el = document.getElementById(`cd-${c.id}`);
      if (!el) { clearInterval(interval); return; }
      el.innerHTML = countdownHTML(c.date);
      checkNotification(c);
    }, 1000);
    countdownIntervals[c.id] = interval;
  });

  updateStats();
  updateStreak();
  updatePlatformStats();
}

function clearAllIntervals() {
  Object.values(countdownIntervals).forEach(clearInterval);
  countdownIntervals = {};
}

// ── STATS ──
function updateStats() {
  const now = Date.now();
  document.getElementById('stat-upcoming').textContent = contests.filter(c => c.date > now).length;
  document.getElementById('stat-total').textContent = contests.length;
  document.getElementById('stat-participated').textContent = contests.filter(c => c.participated).length;
  document.getElementById('stat-streak').textContent = calcStreak();
}

function calcStreak() {
  // Count consecutive weeks with at least 1 participation
  let streak = 0;
  const now = Date.now();
  for (let w = 0; w < 52; w++) {
    const weekStart = now - (w + 1) * 7 * 86400000;
    const weekEnd = now - w * 7 * 86400000;
    const hasParticipation = contests.some(c => c.date >= weekStart && c.date < weekEnd && c.participated);
    if (hasParticipation) streak++;
    else if (w > 0) break;
  }
  return streak;
}

// ── STREAK GRID ──
function updateStreak() {
  const grid = document.getElementById('streak-grid');
  const now = Date.now();
  const cells = [];
  for (let d = 27; d >= 0; d--) {
    const dayStart = new Date(now - d * 86400000);
    dayStart.setHours(0, 0, 0, 0);
    const dayEnd = new Date(dayStart.getTime() + 86400000);
    const had = contests.some(c => c.date >= dayStart.getTime() && c.date < dayEnd.getTime() && c.participated);
    const dateStr = dayStart.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
    cells.push(`<div class="streak-cell ${had ? 'participated' : ''}" title="${dateStr}${had ? ' ✅' : ''}"></div>`);
  }
  grid.innerHTML = cells.join('');
  document.getElementById('streak-display').textContent = `${calcStreak()} week streak 🔥`;
}

// ── PLATFORM STATS ──
function updatePlatformStats() {
  const platforms = ['HackerEarth','LeetCode','Codeforces','HackerRank','CodeChef'];
  const counts = {};
  platforms.forEach(p => counts[p] = contests.filter(c => c.platform === p).length);
  const max = Math.max(...Object.values(counts), 1);
  document.getElementById('platform-stats').innerHTML = platforms.map(p => `
    <div class="platform-stat">
      <div class="pstat-dot" style="background:${PLATFORM_COLORS[p]}"></div>
      <div class="pstat-name" style="font-size:0.8rem">${p}</div>
      <div class="pstat-bar-wrap">
        <div class="pstat-bar" style="width:${(counts[p]/max)*100}%;background:${PLATFORM_COLORS[p]}"></div>
      </div>
      <div class="pstat-count">${counts[p]}</div>
    </div>`).join('');
}

// ── ACTIONS ──
function addContest() {
  const name = document.getElementById('in-name').value.trim();
  const platform = document.getElementById('in-platform').value;
  const dateVal = document.getElementById('in-date').value;
  const duration = parseInt(document.getElementById('in-duration').value) || 90;
  const difficulty = document.getElementById('in-difficulty').value;

  if (!name || !dateVal) { toast('⚠️ Please fill in name and date'); return; }
  const ts = new Date(dateVal).getTime();
  if (ts < Date.now()) { toast('⚠️ Date must be in the future'); return; }

  contests.push({ id: uid(), name, platform, date: ts, duration, difficulty, participated: false, reminded: false });
  save();
  render();
  document.getElementById('in-name').value = '';
  document.getElementById('in-date').value = '';
  document.getElementById('in-duration').value = '';
  toast(`✅ "${name}" added!`);
}

function toggleParticipated(id) {
  const c = contests.find(x => x.id === id);
  if (c) { c.participated = !c.participated; save(); render(); toast(c.participated ? '🏆 Marked as participated!' : 'Unmarked'); }
}

function toggleRemind(id) {
  const c = contests.find(x => x.id === id);
  if (!c) return;
  if (Notification.permission !== 'granted') { toast('Please enable notifications first!'); return; }
  c.reminded = !c.reminded;
  save(); render();
  toast(c.reminded ? `🔔 Reminder set for "${c.name}"` : '🔕 Reminder removed');
}

function deleteContest(id) {
  contests = contests.filter(x => x.id !== id);
  save(); render(); toast('🗑 Contest removed');
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function clearAll() {
  if (!confirm('Clear all contest data?')) return;
  contests = []; save(); render(); toast('🗑 All data cleared');
}

// ── NOTIFICATIONS ──
function requestNotifPermission() {
  if (!('Notification' in window)) { toast('Browser notifications not supported'); return; }
  Notification.requestPermission().then(p => {
    toast(p === 'granted' ? '🔔 Notifications enabled!' : '❌ Notifications blocked');
  });
}

let notifiedIds = new Set(JSON.parse(localStorage.getItem('notified') || '[]'));

function checkNotification(c) {
  if (!c.reminded || notifiedIds.has(c.id)) return;
  const diff = c.date - Date.now();
  if (diff > 0 && diff <= 1800000) { // 30 minutes
    new Notification(`⚡ ContestCal: Starting soon!`, {
      body: `${c.name} on ${c.platform} starts in ~30 minutes`,
      icon: '⚡'
    });
    notifiedIds.add(c.id);
    localStorage.setItem('notified', JSON.stringify([...notifiedIds]));
  }
}

// ── ICS EXPORT ──
function exportICS() {
  const upcoming = contests.filter(c => c.date > Date.now());
  if (!upcoming.length) { toast('No upcoming contests to export'); return; }
  const fmt = ts => new Date(ts).toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';
  const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//ContestCal//EN'];
  upcoming.forEach(c => {
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${c.id}@contestcal`);
    lines.push(`DTSTART:${fmt(c.date)}`);
    lines.push(`DTEND:${fmt(c.date + c.duration * 60000)}`);
    lines.push(`SUMMARY:${c.name} [${c.platform}]`);
    lines.push(`DESCRIPTION:Difficulty: ${c.difficulty}\\nPlatform: ${c.platform}`);
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'contestcal.ics';
  a.click();
  toast(`📅 Exported ${upcoming.length} contests to .ics`);
}

// ── INIT ──
seedData();
render();

// Set min date for input
const minDt = new Date(Date.now() + 60000).toISOString().slice(0, 16);
document.getElementById('in-date').min = minDt;
</script>
